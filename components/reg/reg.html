<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/reg.css">
    <title>Отзовик - Регистрация</title>
</head>
<body>
    <script type="module" src="/js/checkToken.js" defer></script>
    <script src="/js/registration.js" defer></script>
    <header class="header">
        <div class="logo-area">
            <span class="logo-placeholder"><img src="/logo.png" alt="Логотип"></span>
            <a href="/"><span class="site-name"><strong>Отзовик</strong></span></a>
        </div>
        <div class="header-right">
            <a class="login-btn" href="/login">Вход</a>

            <a class="login-btn" href="/profile">Личный кабинет</a>

        </div>
    </header>

    <main class="main-content">
        <div class="registration-container">
            <div class="registration-box">
                <h1 class="registration-title">Регистрация</h1>

                    <form id="reg-form" class="registration-form">
                        <div class="form-group">
                            <label class="form-label">Электронная почта</label>
                            <input id="email" type="email" class="form-input" name="email" placeholder="example@mail.com" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Имя</label>
                            <input id="name" type="text" class="form-input" name="firstname" placeholder="Иван" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Фамилия</label>
                            <input id="lastname" type="text" class="form-input" name="lastname" placeholder="Иванович" required>
                        </div>

                        <!-- НОВОЕ ПОЛЕ: Пол -->
                        <div class="form-group">
                            <label class="form-label">Пол</label>
                            <select id="gender" class="form-input" name="gender" required>
                                <option value="male">Мужской</option>
                                <option value="female">Женский</option>
                            </select>
                        </div>

                        <!-- НОВОЕ ПОЛЕ: Город -->
                        <div class="form-group">
                            <label class="form-label">Город</label>
                            <input id="city" type="text" class="form-input" name="city" placeholder="Москва" required>
                        </div>

                        <!-- НОВОЕ ПОЛЕ: Дата рождения -->
                        <div class="form-group">
                            <label class="form-label">Дата рождения</label>
                            <input id="birthdate" type="date" class="form-input" name="birthdate" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Пароль</label>
                            <input id="password" type="password" class="form-input" name="password" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Повтор пароля</label>
                            <input id="password_confirm" type="password" class="form-input" name="password_confirm" required>
                        </div>

                        <button type="submit" class="register-button">Зарегистрироваться</button>

                        <div class="login-link">
                            <span class="login-link-text">Уже есть аккаунт?</span>
                            <a href="/login" class="login-link-action">Войти</a>
                        </div>
                    </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-info">
            <strong>Отзовик.рф</strong><br>
            +7(981)918-81-18
            г. Москва, ул. Красная, д. 7<br>
            Все права защищены 2026<br>
            <a href="/faq" class="faq-link">FAQ</a>
        </div>
    </footer>
</body>
</html>
